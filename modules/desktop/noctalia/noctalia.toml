[nightlight]
enabled = false
temperature_day = 6500
temperature_night = 4000

[notification]
enable_daemon = true

[osd]
position = "top_right"

[shell]
avatar_path = "/home/themarlstar/cloud/google-drive/pfp/grimm.jpg"
password_style = "random"
telemetry_enabled = false
ui_scale = 1.0

    [[shell.session.actions]]
    action = "lock"
    enabled = true

    [[shell.session.actions]]
    action = "suspend"
    enabled = true

    [[shell.session.actions]]
    action = "logout"
    enabled = true

    [[shell.session.actions]]
    action = "reboot"
    enabled = true

    [[shell.session.actions]]
    action = "shutdown"
    enabled = true

[theme]
builtin = "Catppuccin"
community_palette = "Oxocarbon"
mode = "dark"
source = "builtin"
wallpaper_scheme = "m3-content"

[wallpaper]
directory = "/home/themarlstar/wallpapers"
enabled = true
fill_mode = "crop"
transition_duration = 1000
transition_on_startup = true

    [wallpaper.default]
    path = "/home/themarlstar/wallpapers/firewatch.jpeg"

    [wallpaper.last]
    path = "/home/themarlstar/wallpapers/firewatch.jpeg"

    [[wallpaper.favorite]]
    builtin_palette = "Catppuccin"
    palette_source = "builtin"
    path = "/home/themarlstar/wallpapers/firewatch.jpeg"
    theme_mode = "dark"

[weather]
effects = true
enabled = true
unit = "celsius"

[widget.active_window]
title_scroll = "on_hover"

[widget.control-center]
glyph = "layout-2-filled"

[widget.media]
hide_when_no_media = true

[widget.spacer_2]
type = "spacer"

[widget.sysmon]
stat = "gpu_usage"

[widget.workspaces]
display = "none"
