[bar.main]
auto_hide = true
background_opacity = 0.69999998435378075
center = [ "control-center", "active_window" ]
enabled = true
end = [ "media", "tray", "brightness", "battery", "clock", "caffeine", "notifications" ]
margin_edge = 8
margin_ends = 8
padding = 12
position = "top"
radius = 12
reserve_space = false
scale = 1.0
start = [ "session", "cpu", "sysmon", "ram", "network", "bluetooth", "volume" ]
thickness = 34
widget_spacing = 12

[calendar]
enabled = true

[[control_center.shortcuts]]
type = "wifi"

[[control_center.shortcuts]]
type = "bluetooth"

[desktop_widgets]
enabled = false

[keybinds]
cancel = [ "escape" ]
down = [ "down" ]
left = [ "left" ]
right = [ "right" ]
up = [ "up" ]
validate = [ "return" ]

[location]
address = "Brisbane, Australia"
auto_locate = false

[lockscreen_widgets]
enabled = true
schema_version = 2
widget_order = [
    "lockscreen-login-box@DP-6",
    "lockscreen-widget-0000000000000001",
    "lockscreen-widget-0000000000000002",
    "lockscreen-widget-0000000000000003",
    "lockscreen-widget-0000000000000004",
    "lockscreen-widget-0000000000000005",
    "lockscreen-widget-0000000000000006"
]

    [lockscreen_widgets.grid]
    cell_size = 8
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-6"]
    box_height = 0.0
    box_width = 0.0
    cx = 1720.0
    cy = 1385.0
    output = "DP-6"
    rotation = 0.0
    type = "login_box"

